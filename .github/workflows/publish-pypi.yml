name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - canary

jobs:
  build:
    name: Build distribution artifacts
    runs-on: ubuntu-latest
    env:
      # Tag pushes are always stable. Manual dispatch can pick the channel.
      RELEASE_CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Verify tag matches project version
        if: env.RELEASE_CHANNEL == 'stable'
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          ref_type = os.environ.get("GITHUB_REF_TYPE")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")

          if ref_type != "tag":
              print("Non-tag run detected; skipping tag/version verification.")
              raise SystemExit(0)

          expected_tag = f"v{version}"
          if ref_name != expected_tag:
              raise SystemExit(
                  f"Release tag {ref_name!r} does not match project.version {version!r}. "
                  f"Expected tag: {expected_tag!r}."
              )

          print(f"Verified release tag {ref_name!r} matches project.version {version!r}.")
          PY

      - name: Prepare canary build metadata
        if: env.RELEASE_CHANNEL == 'canary'
        run: |
          python scripts/release.py --channel canary --prepare-only --skip-clean-check

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution artifacts to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
